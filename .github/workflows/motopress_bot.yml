name: La Banda Motera Bot - Generador Automatico

on:
  # schedule:
  #   - cron: '0 13 */4 * *'  # 10:00 AM Argentina (UTC-3), cada 4 dias — PAUSADO
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo generar sin publicar'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - run: pip install -r requirements.txt

      - name: Ejecutar Bot
        env:
          ANTHROPIC_API_KEY: '${{ secrets.ANTHROPIC_API_KEY }}'
          EXA_API_KEY: '${{ secrets.EXA_API_KEY }}'
          WP_URL: '${{ secrets.WP_URL }}'
          WP_USER: '${{ secrets.WP_USER }}'
          WP_APP_PASS: '${{ secrets.WP_APP_PASS }}'
        run: python main.py

      - name: Guardar hash log en el repo
        if: always()
        continue-on-error: true
        run: |
          git config user.name "LBM Bot"
          git config user.email "bot@labandamotera.com"
          git add published_hashes.json
          git diff --staged --quiet || git commit -m "chore: actualizar hash log [skip ci]"
          git push origin main
